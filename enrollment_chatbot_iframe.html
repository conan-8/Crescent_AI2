<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Chatbot Iframe</title>
    <!-- Material Symbols for Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" />
    <!-- Alilato Arabic Regular Font -->
    <link rel="stylesheet" href="chatbot.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'Alilato Arabic Regular', sans-serif;
            width: 100vw;
            height: 100vh;
        }

        /* Ensure the iframe content is clickable where elements are */
        * {
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <button class="chatbot-toggler">
        <span style="font-size:26px;line-height:1;">💬</span>
    </button>

    <div class="chatbot">
        <header>
            <span class="new-chat-btn" title="New Chat">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    <line x1="12" y1="8" x2="12" y2="16"/>
                    <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
            </span>
            <h2>Enrollment Assistant</h2>
            <span class="close-btn material-symbols-rounded">close</span>
        </header>

        <ul class="chatbox">
            <li class="chat incoming">
                <span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="28" height="28"><polygon points="6,17 9,2 14,13" fill="#D4A843"/><polygon points="7.5,16 9.5,6 12.5,13" fill="#F5E6B8"/><polygon points="26,17 23,2 18,13" fill="#D4A843"/><polygon points="24.5,16 22.5,6 19.5,13" fill="#F5E6B8"/><ellipse cx="16" cy="21" rx="12" ry="11" fill="#D4A843"/><ellipse cx="16" cy="26" rx="6.5" ry="5" fill="#F5E6B8"/><circle cx="12" cy="20" r="2.2" fill="#1a0a00"/><circle cx="20" cy="20" r="2.2" fill="#1a0a00"/><ellipse cx="16" cy="24" rx="1.8" ry="1.2" fill="#1a0a00"/></svg></span>
                <p>I am a Crescent student-developed chatbot that specializes in Enrolment. What is your question today?</p>
            </li>

        </ul>
        <div class="chat-input">
            <textarea placeholder="Enter a message..." spellcheck="false" required></textarea>
            <button id="send-btn" class="send-btn" type="button" aria-label="Send message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <script src="enrollment_chatbot.js"></script>
</body>

</html>
