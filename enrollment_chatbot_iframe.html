<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Chatbot Iframe</title>
    <!-- Material Symbols for Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link rel="stylesheet" href="chatbot.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: sans-serif;
            width: 100vw;
            height: 100vh;
        }

        /* Ensure the iframe content is clickable where elements are */
        * {
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <button class="chatbot-toggler">
        <span>💬</span>
    </button>

    <div class="chatbot">
        <header>
            <span class="new-chat-btn" title="New Chat">+</span>
            <h2>Enrollment Assistant</h2>
            <span class="close-btn material-symbols-rounded">close</span>
        </header>
        <div id="enrollment-banner" class="enrollment-banner">
            <span class="banner-icon">📞</span>
            <span class="banner-text">Want to speak with enrollment?</span>
            <button id="banner-schedule-btn" class="banner-btn">Schedule Call</button>
        </div>
        <ul class="chatbox">
            <li class="chat incoming">
                <span>🤖</span>
                <p>Hello! 👋<br>I can answer your questions about Crescent School admissions.</p>
            </li>
        </ul>
        <div class="chat-input">
            <textarea placeholder="Enter a message..." spellcheck="false" required></textarea>
            <button id="send-btn" class="send-btn" type="button" aria-label="Send message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <script src="enrollment_chatbot.js"></script>
</body>

</html>
