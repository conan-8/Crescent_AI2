<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Iframe</title>
    <!-- Material Symbols for Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@48,400,0,0" />
    <!-- Tajawal Font -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" />
    <link rel="stylesheet" href="chatbot.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'Tajawal', sans-serif;
            width: 100vw;
            height: 100vh;
        }

        /* Ensure the iframe content is clickable where elements are */
        * {
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <button class="chatbot-toggler">
        <span style="font-size:26px;line-height:1;position:relative;top:5px;">💬</span>
    </button>

    <div class="chatbot">
        <header>
            <span class="new-chat-btn" title="New Chat">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    <line x1="12" y1="6" x2="12" y2="14"/>
                    <line x1="8" y1="10" x2="16" y2="10"/>
                </svg>
            </span>
            <span class="close-btn material-symbols-rounded">close</span>
        </header>

        <div class="welcome-screen" id="welcome-screen">
            <p class="welcome-text">Hi! 👋<br>I'm a Crescent student-developed chatbot.<br><span class="welcome-tagline">How can I help?</span></p>
        </div>

        <ul class="chatbox" style="display:none;"></ul>
        <div class="chat-input">
            <textarea placeholder="Enter a message..." spellcheck="false" required></textarea>
            <button id="send-btn" class="send-btn" type="button" aria-label="Send message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <script src="enrollment_chatbot.js"></script>
</body>

</html>
